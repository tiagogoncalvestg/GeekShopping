        context: ./Services/IdentityServer/
        dockerfile: ./GeekShopping.IdentityServer/Dockerfile  

  productapi:
    build:
        context: ./Services/ProductApi/
        dockerfile: ./GeekShopping.ProductApi/Dockerfile  