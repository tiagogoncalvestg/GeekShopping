version: '3.8'

services:
  front:
    build:
        context: ./FrontEnd/
        dockerfile: ./GeekShopping.Web/Dockerfile
  
  cartapi:
    build:
        context: ./Services/CartApi/
        dockerfile: ./GeekShopping.CartApi/Dockerfile
        
  couponapi:
