apiVersion: apps/v1
kind: Deployment
metadata:
  name: mydeployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: storeoncontainer
        image: srtg/storeoncontainer:1.0
        resources:
          limits:
            memory: "128Mi"
            cpu: "500m"
        ports:
          - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: mydeployment-service
spec:
  selector:
    app: frontend
  ports:
  - port: 80
    nodePort: 30000
  type: NodePort

  
